name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: pcov
          extensions: json, pdo, pdo_sqlite, sodium
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run test suite
        run: vendor/bin/phpunit --coverage-clover coverage/clover.xml

      - name: Enforce coverage
        run: php -r '$xml = simplexml_load_file("coverage/clover.xml"); $m = $xml->project->metrics; $coverage = (float) $m["statements"] === 0.0 ? 0.0 : 100 * (float) $m["coveredstatements"] / (float) $m["statements"]; printf("Statement coverage: %.2f%%\n", $coverage); exit($coverage >= 90 ? 0 : 1);'

      - name: Run static analysis
        run: vendor/bin/phpstan analyse --memory-limit=1G

      - name: Check code style
        run: vendor/bin/phpcs
