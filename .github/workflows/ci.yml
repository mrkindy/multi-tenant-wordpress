name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3', '8.4']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: pcov
          extensions: pdo_sqlite, sodium
          tools: composer:v2
          cache: composer

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run static analysis
        run: vendor/bin/phpstan analyse --memory-limit=1G

      - name: Check code style
        run: vendor/bin/phpcs

      - name: Run test suite
        run: vendor/bin/phpunit --coverage-clover coverage/clover.xml

      - name: Enforce coverage
        shell: bash
        run: |
          php <<'PHP'
          <?php

          if (! file_exists('coverage/clover.xml')) {
              fwrite(STDERR, "Coverage report not found\n");
              exit(1);
          }

          $xml = simplexml_load_file('coverage/clover.xml');

          if (! isset($xml->project->metrics)) {
              fwrite(STDERR, "Invalid Clover report\n");
              exit(1);
          }

          $metrics = $xml->project->metrics;

          $statements = (float) $metrics['statements'];
          $coveredStatements = (float) $metrics['coveredstatements'];

          $coverage = $statements === 0.0
              ? 0.0
              : ($coveredStatements / $statements) * 100;

          printf("Statement coverage: %.2f%%\n", $coverage);

          exit($coverage >= 90.0 ? 0 : 1);
          PHP

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.php-version }}
          path: coverage/